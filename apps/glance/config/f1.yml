- name: Formula 1
  columns:
    - size: small
      widgets:
        - type: custom-api
          title: Circuit Weather
          cache: 30m
          timeout: 20s
          url: http://f1_api:4463/f1/next_race/
          template: | # html
            {{ $races := .JSON.Array "race" }}
            {{ if gt (len $races) 0 }}
              {{ $race := index $races 0 }}
              {{ $city := .JSON.String "circuit_weather.location.city" }}
              {{ $country := .JSON.String "circuit_weather.location.country" }}
              {{ if .JSON.Exists "circuit_weather.current.temperature_2m" }}
                <div style="padding: 8px 0;">
                  <p class="size-h3 color-primary" style="margin: 0 0 10px 0; text-align: center;">{{ $city }}, {{ $country }}</p>
                  <div style="background: var(--color-widget-background-highlight); padding: 10px; border-radius: 4px;">
                    <div class="flex justify-between" style="font-size: 0.9em; margin-bottom: 6px;">
                      <span class="color-subdue">Temperature</span>
                      <span class="color-primary" style="font-weight: bold;">{{ .JSON.Float "circuit_weather.current.temperature_2m" | printf "%.1f" }}°C</span>
                    </div>
                    <div class="flex justify-between" style="font-size: 0.9em; margin-bottom: 6px;">
                      <span class="color-subdue">Feels Like</span>
                      <span>{{ .JSON.Float "circuit_weather.current.apparent_temperature" | printf "%.1f" }}°C</span>
                    </div>
                    <div class="flex justify-between" style="font-size: 0.9em; margin-bottom: 6px;">
                      <span class="color-subdue">Humidity</span>
                      <span>{{ .JSON.Int "circuit_weather.current.relative_humidity_2m" }}%</span>
                    </div>
                    <div class="flex justify-between" style="font-size: 0.9em; margin-bottom: 6px;">
                      <span class="color-subdue">Wind</span>
                      <span>{{ .JSON.Float "circuit_weather.current.wind_speed_10m" | printf "%.0f" }} km/h</span>
                    </div>
                    <div class="flex justify-between" style="font-size: 0.9em; margin-bottom: 6px;">
                      <span class="color-subdue">Rain Chance</span>
                      <span>{{ .JSON.Int "circuit_weather.daily.precipitation_probability_max" }}%</span>
                    </div>
                    <div class="flex justify-between" style="font-size: 0.9em;">
                      <span class="color-subdue">Today (Min/Max)</span>
                      <span>{{ .JSON.Float "circuit_weather.daily.temperature_2m_min" | printf "%.0f" }}° / {{ .JSON.Float "circuit_weather.daily.temperature_2m_max" | printf "%.0f" }}°C</span>
                    </div>
                  </div>
                </div>
              {{ else }}
                <div style="padding: 8px 0;">
                  <p class="size-h3 color-primary" style="margin: 0 0 10px 0; text-align: center;">{{ $race.String "circuit.city" }}, {{ $race.String "circuit.country" }}</p>
                  <p class="color-negative">Weather data unavailable right now.</p>
                </div>
              {{ end }}
            {{ else }}
              <p class="color-negative">No race data available</p>
            {{ end }}

        - type: group
          widgets:
            - type: custom-api
              title: Drivers
              cache: 1h
              timeout: 20s
              url: http://f1_api:4463/f1/drivers_standings/
              template: | # html
                <ul class="list list-gap-3 collapsible-container" data-collapse-after="10" style="font-size: 0.85em;">
                  {{ $drivers := .JSON.Array "drivers" }}
                  {{ if gt (len $drivers) 0 }}
                    {{ range $drivers }}
                      <li class="flex gap-3 items-center" style="padding: 6px 0;">
                        <div style="flex-shrink: 0; width: 20px; text-align: center; font-weight: bold; color: var(--color-primary); font-size: 0.9em;">{{ .Int "position" }}</div>
                        <div style="width: 18px; flex-shrink: 0;">
                          {{ if ne (.String "flag") "" }}<img src="https://flagcdn.com/24x18/{{ .String "flag" }}.png" alt="{{ .String "country" }}" style="width: 100%; border-radius: 2px;">{{ end }}
                        </div>
                        <div style="flex: 1; min-width: 0;">
                          <a href="https://www.formula1.com" target="_blank" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; font-size: 0.9em;">{{ .String "surname" }}</a>
                        </div>
                        <div style="flex-shrink: 0; font-weight: bold; color: var(--color-primary); min-width: 30px; text-align: right; font-size: 0.9em;">{{ .Int "points" }}</div>
                      </li>
                    {{ end }}
                  {{ else }}
                    <p class="color-negative">No drivers data found.</p>
                  {{ end }}
                </ul>

            - type: custom-api
              title: Constructors
              cache: 1h
              timeout: 20s
              url: http://f1_api:4463/f1/constructors_standings/
              template: | # html
                <ul class="list list-gap-3 collapsible-container" data-collapse-after="11" style="font-size: 0.85em;">
                  {{ $constructors := .JSON.Array "constructors" }}
                  {{ if gt (len $constructors) 0 }}
                    {{ range $constructors }}
                      {{ if le (.Int "position") 11 }}
                        <li class="flex gap-3 items-center" style="padding: 6px 0;">
                          <div style="flex-shrink: 0; width: 20px; text-align: center; font-weight: bold; color: var(--color-primary); font-size: 0.9em;">{{ .Int "position" }}</div>
                          <div style="width: 18px; flex-shrink: 0;">
                            {{ if ne (.String "flag") "" }}<img src="https://flagcdn.com/24x18/{{ .String "flag" }}.png" alt="{{ .String "country" }}" style="width: 100%; border-radius: 2px;">{{ end }}
                          </div>
                          <div style="flex: 1; min-width: 0;">
                            <a href="https://www.formula1.com" target="_blank" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; font-size: 0.9em;">{{ .String "team" }}</a>
                          </div>
                          <div style="flex-shrink: 0; font-weight: bold; color: var(--color-primary); min-width: 30px; text-align: right; font-size: 0.9em;">{{ .Int "points" }}</div>
                        </li>
                      {{ end }}
                    {{ end }}
                  {{ else }}
                    <p class="color-negative">No constructors data found.</p>
                  {{ end }}
                </ul>


    - size: full
      widgets:
        - type: custom-api
          title: Track Info
          cache: 1h
          timeout: 20s
          url: http://f1_api:4463/f1/next_race/
          template: | # html
            {{ $races := .JSON.Array "race" }}
            {{ if gt (len $races) 0 }}
              {{ $race := index $races 0 }}
              <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 16px;">
                <!-- Left: Race Details -->
                <div>
                  <div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px;">
                      <div style="background: var(--color-widget-background-highlight); padding: 12px; border-radius: 4px;">
                        <span class="color-subdue" style="font-size: 0.85em; display: block;">Circuit</span>
                        <div class="color-primary" style="font-weight: bold;">{{ $race.String "circuit.circuitName" }}</div>
                      </div>
                      <div style="background: var(--color-widget-background-highlight); padding: 12px; border-radius: 4px;">
                        <span class="color-subdue" style="font-size: 0.85em; display: block;">Laps</span>
                        <div class="color-primary" style="font-weight: bold;">{{ $race.Int "laps" }}</div>
                      </div>
                      <div style="background: var(--color-widget-background-highlight); padding: 12px; border-radius: 4px;">
                        <span class="color-subdue" style="font-size: 0.85em; display: block;">Distance</span>
                        <div class="color-primary" style="font-weight: bold;">{{ $race.Float "totalDistanceKm" | printf "%.2f" }} / {{ $race.Float "circuit.circuitLengthKm" | printf "%.3f" }} km</div>
                      </div>
                      <div style="background: var(--color-widget-background-highlight); padding: 12px; border-radius: 4px;">
                        <span class="color-subdue" style="font-size: 0.85em; display: block;">Fastest Lap</span>
                        <div class="color-primary" style="font-weight: bold; font-size: 0.95em;">{{ $race.String "circuit.lapRecord" }}</div>
                      </div>
                    </div>
                    
                    <div style="background: var(--color-widget-background-highlight); padding: 12px; border-radius: 4px;">
                      <span class="color-subdue" style="font-size: 0.85em; display: block; margin-bottom: 4px;">Fastest Lap Holder</span>
                      <div class="color-primary" style="font-weight: bold;">{{ $race.String "circuit.fastestLapDriverName" }} <span class="color-subdue" style="font-weight: normal;">({{ $race.Int "circuit.fastestLapYear" }})</span></div>
                    </div>
                  </div>
                </div>
                
                <!-- Right: Track Map & Weather -->
                <div style="display: flex; flex-direction: column; height: 100%;">
                  <div style="display: flex; align-items: center; justify-content: center; background: var(--color-widget-background-highlight); border-radius: 4px; padding: 12px; flex: 1; min-height: 0; overflow: hidden;">
                    <img src="https://f1.jr4.in/f1/next_map/" alt="Track Map" style="max-width: 100%; max-height: 100%; width: auto; height: 100%; object-fit: contain; border-radius: 4px;">
                  </div>
                </div>
              </div>
            {{ else }}
              <p class="color-negative">No race data available.</p>
            {{ end }}

        - type: custom-api
          title: Weekend Timeline
          cache: 15m
          timeout: 20s
          url: http://f1_api:4463/f1/next_race/
          template: | # html
            {{ $timeline := .JSON.Array "timeline" }}
            <div style="display: flex; flex-direction: column; gap: 10px;">
              {{ if gt (len $timeline) 0 }}
                {{ range $timeline }}
                  <div style="display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 6px; background: {{ if or (eq (.String "state") "latest") (eq (.String "state") "next") }}var(--color-widget-background-highlight){{ else }}var(--color-background){{ end }};">
                    <div style="width: 8px; height: 8px; border-radius: 999px; background: {{ if or (eq (.String "state") "latest") (eq (.String "state") "next") }}var(--color-primary){{ else }}var(--color-subdue){{ end }};"></div>
                    <div style="flex: 1;">
                      <div class="color-primary" style="font-weight: bold;">{{ .String "short_name" }}</div>
                      <div class="color-subdue" style="font-size: 0.82em;">{{ .String "date" }} {{ .String "time" }}</div>
                    </div>
                    <div style="font-size: 0.78em;">{{ .String "state_label" }}</div>
                  </div>
                {{ end }}
              {{ else }}
                <p class="color-negative">Timeline data unavailable.</p>
              {{ end }}
            </div>
        
        - type: custom-api
          title: Next Race
          cache: 1h
          timeout: 20s
          url: http://f1_api:4463/f1/next_race/following/
          template: | # html
            {{ $races := .JSON.Array "race" }}
            {{ if gt (len $races) 0 }}
              {{ $race := index $races 0 }}
              {{ $country := $race.String "circuit.country" }}
              {{ $track := $race.String "circuit.circuitName" }}
              {{ $raceDate := .JSON.String "race.0.schedule.race.date" }}
              {{ $raceDateTime := .JSON.String "race.0.schedule.race.datetime_rfc3339" }}
              <div style="padding: 6px 0;">
                  <div class="color-primary" style="font-size: 1em; font-weight: 700; line-height: 1.35;">{{ $country }} - {{ $track }}</div>
                  <div class="color-subdue" style="font-size: 0.76em; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; line-height: 1.4;">
                    <span>in</span>
                    {{ if ne $raceDateTime "" }}
                      <span class="color-primary" style="font-weight: 700;" {{ $raceDateTime | parseTime "rfc3339" | toRelativeTime }}></span>
                    {{ else }}
                      <span class="color-primary" style="font-weight: 700;">TBA</span>
                    {{ end }}
                    {{ if ne $raceDate "" }}<span>({{ $raceDate | parseTime "DateOnly" | formatTime "Jan 2" }})</span>{{ end }}
                  </div>
                </div>
            {{ else if ne (.JSON.String "message") "" }}
              <p class="color-subdue">{{ .JSON.String "message" }}</p>
            {{ else }}
              <p class="color-negative">No next race data available.</p>
            {{ end }}
            

    - size: full
      widgets:
        - type: custom-api
          title: Last Completed Session
          cache: 15m
          timeout: 20s
          url: http://f1_api:4463/f1/next_race/last_session/
          template: | # html
            {{ $results := .JSON.Array "results" }}
            {{ $sessionKey := .JSON.String "session.key" }}
            {{ if .JSON.Exists "session.name" }}
              <div style="display: flex; flex-direction: column; gap: 14px;">
                <div style="background: var(--color-widget-background-highlight); border-radius: 6px; padding: 14px;">
                  <div class="color-primary" style="font-size: 1.2em; font-weight: bold; margin-bottom: 4px;">{{ .JSON.String "session.name" }}</div>
                  <div class="color-subdue">Round {{ .JSON.Int "round" }} • {{ .JSON.String "event_name" }}</div>
                </div>

                <div style="background: var(--color-widget-background-highlight); border-radius: 6px; padding: 14px;">
                  <div class="color-primary" style="font-size: 1.05em; font-weight: bold; margin-bottom: 10px;">Top 10</div>
                  {{ if gt (len $results) 0 }}
                    <ul class="list list-gap-3" style="font-size: 0.9em;">
                      {{ range $results }}
                        <li class="flex gap-3 items-center" style="padding: {{ if or (eq $sessionKey "qualy") (eq $sessionKey "sprintQualy") }}10px 0{{ else }}8px 0{{ end }}; border-bottom: 1px solid var(--color-background);">
                          <div style="flex-shrink: 0; width: 30px; text-align: center; font-weight: bold; color: {{ if eq (.Int "position") 1 }}#FFD700{{ else if eq (.Int "position") 2 }}#C0C0C0{{ else if eq (.Int "position") 3 }}#CD7F32{{ else }}var(--color-primary){{ end }};">P{{ .Int "position" }}</div>
                          <div style="flex: 1; min-width: 0;">
                            <div style="font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: {{ if eq (.String "fastest_lap") "true" }}var(--badge-success){{ else }}var(--color-primary){{ end }};">{{ .String "driver" }}</div>
                            <div class="color-subdue" style="font-size: 0.8em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">{{ .String "team" }}</div>
                          </div>
                          {{ if or (eq $sessionKey "fp1") (eq $sessionKey "fp2") (eq $sessionKey "fp3") }}
                            <div style="flex-shrink: 0; min-width: 44px; text-align: right; font-size: 0.82em;">
                              <span class="color-primary" style="font-weight: bold;">{{ .Int "laps_completed" }}L</span>
                            </div>
                          {{ else if or (eq $sessionKey "qualy") (eq $sessionKey "sprintQualy") }}
                            <div style="flex-shrink: 0; min-width: 102px; text-align: right; font-size: 0.73em; line-height: 1.2;">
                              <div style="display: inline-flex; flex-direction: column; gap: 3px; min-width: 102px; padding: 6px 8px; border-radius: 7px; background: color-mix(in srgb, var(--color-widget-background-highlight) 72%, transparent);">
                                <div style="display: flex; justify-content: space-between; gap: 8px; white-space: nowrap;">
                                  <span class="color-subdue">P1</span>
                                  <span class="color-primary" style="font-weight: 700;">{{ if ne (.String "leader_gap") "" }}{{ .String "leader_gap" }}{{ else }}&mdash;{{ end }}</span>
                                </div>
                                <div style="display: flex; justify-content: space-between; gap: 8px; white-space: nowrap;">
                                  <span class="color-subdue">Prev</span>
                                  <span class="color-primary" style="font-weight: 700;">{{ if and (ne (.String "ahead_gap") "") (ne (.String "ahead_gap") "-") }}{{ .String "ahead_gap" }}{{ else }}&mdash;{{ end }}</span>
                                </div>
                              </div>
                            </div>
                          {{ else if or (eq $sessionKey "race") (eq $sessionKey "sprintRace") }}
                            <div style="flex-shrink: 0; min-width: 102px; text-align: right; font-size: 0.73em; line-height: 1.2;">
                              <div style="display: inline-flex; flex-direction: column; gap: 3px; min-width: 102px; padding: 6px 8px; border-radius: 7px; background: color-mix(in srgb, var(--color-widget-background-highlight) 72%, transparent);">
                                <div style="display: flex; justify-content: space-between; gap: 8px; white-space: nowrap;">
                                  <span class="color-subdue">P1</span>
                                  <span class="color-primary" style="font-weight: 700;">{{ if ne (.String "leader_gap") "" }}{{ .String "leader_gap" }}{{ else }}&mdash;{{ end }}</span>
                                </div>
                                <div style="display: flex; justify-content: space-between; gap: 8px; white-space: nowrap;">
                                  <span class="color-subdue">Grid</span>
                                  <span style="font-weight: 700; color: {{ if gt (.Int "grid_delta") 0 }}#22c55e{{ else if lt (.Int "grid_delta") 0 }}#ef4444{{ else }}#9ca3af{{ end }};">{{ .String "grid_delta_text" }}</span>
                                </div>
                              </div>
                              {{ if ne (.String "penalty_marker") "" }}
                                <div style="margin-top: 4px; font-size: 0.72em; color: #ef4444; font-weight: 700;">Penalty</div>
                              {{ end }}
                            </div>
                          {{ end }}
                          <div style="flex-shrink: 0; min-width: {{ if or (eq $sessionKey "race") (eq $sessionKey "sprintRace") }}72px{{ else if or (eq $sessionKey "qualy") (eq $sessionKey "sprintQualy") }}62px{{ else }}28px{{ end }}; text-align: center;">
                            {{ if or (eq $sessionKey "qualy") (eq $sessionKey "sprintQualy") }}
                              <div style="display: inline-flex; flex-direction: column; align-items: center; gap: 5px;">
                                {{ if ne (.String "sector_marks_text") "" }}
                                  <span style="display: inline-flex; align-items: center; gap: 4px; padding: 5px 7px; border-radius: 999px; background: color-mix(in srgb, var(--color-background) 65%, transparent); white-space: nowrap; font-size: 0.68em; letter-spacing: 0.08em;">
                                    {{ .String "sector_marks_text" }}
                                  </span>
                                {{ end }}
                                {{ if ne (.String "compound") "" }}
                                  <span style="font-size: 0.74em; font-weight: 800; letter-spacing: 0.04em;">
                                    <span class="color-subdue">[</span><span style="color: {{ if eq (.String "compound") "S" }}#ff6e79{{ else if eq (.String "compound") "M" }}#ffb86c{{ else if eq (.String "compound") "H" }}#999{{ else if eq (.String "compound") "I" }}#c3fb5b{{ else if eq (.String "compound") "W" }}#60a5fa{{ else }}#999{{ end }};">{{ if eq (.String "compound") "S" }}s{{ else if eq (.String "compound") "M" }}m{{ else if eq (.String "compound") "H" }}h{{ else if eq (.String "compound") "I" }}i{{ else if eq (.String "compound") "W" }}w{{ else }}-{{ end }}</span><span class="color-subdue">]</span>
                                  </span>
                                {{ end }}
                              </div>
                            {{ else if and (or (eq $sessionKey "race") (eq $sessionKey "sprintRace")) (gt (len (.Array "tyre_sequence")) 0) }}
                              <span style="display: inline-flex; align-items: center; justify-content: center; gap: 0 2px; flex-wrap: wrap; max-width: 84px; font-size: 0.78em; font-weight: 800; line-height: 1.1; letter-spacing: 0.02em;">
                                <span class="color-subdue">[</span>
                                {{ range $index, $compound := .Array "tyre_sequence" }}
                                  {{ if gt $index 0 }}<span class="color-subdue">,</span>{{ end }}
                                  <span style="color: {{ if eq ($compound.String "") "S" }}#dc2626{{ else if eq ($compound.String "") "M" }}#f59e0b{{ else if eq ($compound.String "") "H" }}#d1d5db{{ else if eq ($compound.String "") "I" }}#16a34a{{ else if eq ($compound.String "") "W" }}#60a5fa{{ else }}#9ca3af{{ end }};">{{ if eq ($compound.String "") "S" }}s{{ else if eq ($compound.String "") "M" }}m{{ else if eq ($compound.String "") "H" }}h{{ else if eq ($compound.String "") "I" }}i{{ else if eq ($compound.String "") "W" }}w{{ else }}-{{ end }}</span>
                                {{ end }}
                                <span class="color-subdue">]</span>
                              </span>
                            {{ else if ne (.String "compound") "" }}
                              <span style="font-size: 0.84em; font-weight: bold; letter-spacing: 0.02em;"><span class="color-subdue">[</span><span style="color: {{ if eq (.String "compound") "S" }}#dc2626{{ else if eq (.String "compound") "M" }}#f59e0b{{ else if eq (.String "compound") "H" }}#d1d5db{{ else if eq (.String "compound") "I" }}#16a34a{{ else if eq (.String "compound") "W" }}#60a5fa{{ else }}#2563eb{{ end }};">{{ if eq (.String "compound") "S" }}s{{ else if eq (.String "compound") "M" }}m{{ else if eq (.String "compound") "H" }}h{{ else if eq (.String "compound") "I" }}i{{ else if eq (.String "compound") "W" }}w{{ else }}-{{ end }}</span><span class="color-subdue">]</span></span>
                            {{ else }}
                              <span class="color-subdue" style="font-size: 0.8em;">-</span>
                            {{ end }}
                          </div>
                          <div style="flex-shrink: 0; min-width: {{ if or (eq $sessionKey "qualy") (eq $sessionKey "sprintQualy") }}96px{{ else }}78px{{ end }}; text-align: right;">
                            {{ if ne (.String "detail") "" }}
                              {{ if or (eq $sessionKey "qualy") (eq $sessionKey "sprintQualy") }}
                                <div style="display: inline-flex; align-items: center; justify-content: flex-end; min-width: 88px; padding: 6px 9px; border-radius: 7px; background: color-mix(in srgb, var(--color-widget-background-highlight) 78%, transparent);">
                                  <div style="font-weight: 800; white-space: nowrap; letter-spacing: 0.01em; color: {{ if eq (.String "fastest_lap") "true" }}var(--badge-success){{ else }}var(--color-primary){{ end }};">{{ .String "detail" }}</div>
                                </div>
                              {{ else if or (eq $sessionKey "race") (eq $sessionKey "sprintRace") }}
                                <div style="display: inline-flex; flex-direction: column; align-items: flex-end; gap: 4px;">
                                  <div style="font-weight: bold; white-space: nowrap; color: {{ if eq (.String "fastest_lap") "true" }}var(--badge-success){{ else }}var(--color-primary){{ end }};">{{ .String "detail" }}</div>
                                  {{ if ne (.String "points") "" }}
                                    <div class="color-subdue" style="font-size: 0.74em; white-space: nowrap;">{{ .String "points" }} pts</div>
                                  {{ end }}
                                </div>
                              {{ else }}
                                <div style="font-weight: bold; white-space: nowrap; color: {{ if eq (.String "fastest_lap") "true" }}var(--badge-success){{ else }}var(--color-primary){{ end }};">{{ .String "detail" }}</div>
                              {{ end }}
                            {{ else if ne (.String "status") "" }}
                              <div style="font-size: 0.82em; white-space: nowrap;">{{ .String "status" }}</div>
                            {{ end }}
                          </div>
                        </li>
                      {{ end }}
                    </ul>
                  {{ else if ne (.String "load_error") "" }}
                    <p class="color-negative">Session data is not available right now.</p>
                  {{ else }}
                    <p class="color-subdue">Results have not populated yet.</p>
                  {{ end }}
                </div>
              </div>
            {{ else }}
              <p class="color-negative">No completed session data available.</p>
            {{ end }}
