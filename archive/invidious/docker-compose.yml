services:
  # ============================================
  # INVIDIOUS - YouTube Frontend (Bypasses Blocks)
  # ============================================
  invidious:
    container_name: invidious
    image: quay.io/invidious/invidious:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      INVIDIOUS_CONFIG: |
        db:
          dbname: invidious
          user: invidious
          password: ${INVIDIOUS_DB_PASSWORD}
          host: invidious-db
          port: 5432
        check_tables: true
        invidious_companion:
          - private_url: "http://companion:8282/companion"
            public_url: "http://ytmusic.jr4.in/companion"
        invidious_companion_key: ${INVIDIOUS_COMPANION_KEY}
        hmac_key: ${INVIDIOUS_HMAC_KEY}
        https_only: false
        domain: "ytmusic.jr4.in"
        external_port: 80
        use_innertube_for_captions: true
    networks:
      - proxy
      - default
    depends_on:
      invidious-db:
        condition: service_healthy
      companion:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-nv", "--tries=1", "--spider", "http://127.0.0.1:3000/api/v1/stats"]
      interval: 30s
      timeout: 5s
      retries: 2
    logging:
      options:
        max-size: "1G"
        max-file: "4"

  # ============================================
  # INVIDIOUS COMPANION - Required for Playback
  # ============================================
  companion:
    container_name: invidious-companion
    image: quay.io/invidious/invidious-companion:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      SERVER_SECRET_KEY: ${INVIDIOUS_COMPANION_KEY}
      PORT: "8282"
    cap_drop:
      - ALL
    read_only: true
    volumes:
      - companion_cache:/var/tmp/youtubei.js:rw
    networks:
      - proxy
      - default
    logging:
      options:
        max-size: "1G"
        max-file: "4"

  # ============================================
  # INVIDIOUS DATABASE - PostgreSQL
  # ============================================
  invidious-db:
    container_name: invidious-db
    image: docker.io/library/postgres:14
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - invidious_postgres_data:/var/lib/postgresql/data
      - ./config/sql:/config/sql
      - ./docker/init-invidious-db.sh:/docker-entrypoint-initdb.d/init-invidious-db.sh
    environment:
      POSTGRES_DB: invidious
      POSTGRES_USER: invidious
      POSTGRES_PASSWORD: ${INVIDIOUS_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  invidious_postgres_data:
  companion_cache:

networks:
  proxy:
    external: true
